<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 화면에 맞게 비율을 조정하는 필수 메타 태그입니다 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>인체해부학 기말고사 퀴즈</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #F4F7F6;
            --text-color: #333;
            --correct-color: #2ECC71;
            --incorrect-color: #E74C3C;
        }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 15px 0;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .quiz-container {
            width: 90%;
            max-width: 500px;
            background: white;
            margin-top: 20px;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        .progress {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 15px;
            text-align: right;
        }
        .question {
            font-size: 1.15rem;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            background-color: #f9f9f9;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .option-btn:hover {
            background-color: #f1f7ff;
            border-color: var(--primary-color);
        }
        .option-btn:active {
            transform: scale(0.98);
        }
        .option-btn.correct {
            background-color: #e8f8f5;
            border-color: var(--correct-color);
            color: #1e8449;
        }
        .option-btn.incorrect {
            background-color: #fdedec;
            border-color: var(--incorrect-color);
            color: #922b21;
        }
        .option-btn:disabled {
            cursor: not-allowed;
            pointer-events: none;
        }
        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.4;
            display: none;
        }
        .feedback.show {
            display: block;
            animation: fadeIn 0.3s;
        }
        .feedback-correct {
            background-color: #e8f8f5;
            color: #1e8449;
            border-left: 4px solid var(--correct-color);
        }
        .feedback-incorrect {
            background-color: #fdedec;
            color: #922b21;
            border-left: 4px solid var(--incorrect-color);
        }
        .next-btn {
            display: none;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .next-btn.show {
            display: block;
        }
        .result-screen {
            text-align: center;
            display: none;
        }
        .result-screen h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        .score {
            font-size: 2.5rem;
            color: var(--primary-color);
            font-weight: bold;
            margin: 20px 0;
        }
        .restart-btn {
            padding: 15px 30px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">해부학 기말고사 대비</div>

    <div class="quiz-container" id="quizContainer">
        <div class="progress" id="progressText">문제 1 / 10</div>
        <div class="question" id="questionText">여기에 문제가 표시됩니다.</div>
        
        <div id="optionsContainer">
            <!-- 버튼들이 자바스크립트를 통해 생성됩니다 -->
        </div>

        <div class="feedback" id="feedbackBox"></div>
        
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제로</button>
    </div>

    <div class="quiz-container result-screen" id="resultScreen">
        <h2>퀴즈 완료! 🎉</h2>
        <p>수고하셨습니다. 당신의 점수는...</p>
        <div class="score" id="scoreText">0 / 10</div>
        <button class="restart-btn" onclick="restartQuiz()">다시 풀기</button>
    </div>

    <script>
        // PDF 원문 데이터를 바탕으로 한 퀴즈 데이터베이스
        const quizData = [
            {
                question: "중추신경계통 2종류를 쓰시오.",
                options: ["뇌신경, 척수신경", "뇌(Brain), 척수(Spinal cord)", "교감신경, 부교감신경", "투사섬유, 연합섬유"],
                answer: 1,
                rationale: "뇌(Brain)와 척수(Spinal cord)는 중추신경계통입니다."
            },
            {
                question: "내장기관과 피부의 작용을 조절하는 교감신경과 부교감신경으로 구성된 것은?",
                options: ["체성신경계통", "중추신경계통", "자율신경계통(Autonomic nervous system)", "운동신경계통"],
                answer: 2,
                rationale: "자율신경계통(Autonomic nervous system)은 교감신경과 부교감신경으로 구성됩니다."
            },
            {
                question: "뇌와 척수의 항상성을 유지하고 떠 있게 하는 투명한 수용성 매질을 무엇이라 하는가?",
                options: ["뇌척수액(CerebroSpinal Fluid)", "혈장", "림프액", "활액"],
                answer: 0,
                rationale: "뇌척수액(CerebroSpinal Fluid)은 뇌와 척수를 보호하고 항상성을 유지합니다."
            },
            {
                question: "말초신경계통에서 말이집을 형성하는 신경아교세포는?",
                options: ["별아교세포", "희소돌기아교세포", "신경집세포(Schwann cell)", "미세아교세포"],
                answer: 2,
                rationale: "말초신경계통의 말이집은 신경집세포(Schwann cell)가 형성합니다. (중추신경계는 희소돌기아교세포)"
            },
            {
                question: "대뇌의 이마엽과 마루엽을 구분하는 것은?",
                options: ["대뇌고랑", "중심고랑(Central sulcus)", "세로틈새", "가쪽고랑"],
                answer: 1,
                rationale: "중심고랑(Central sulcus)은 대뇌의 이마엽과 마루엽을 구분합니다."
            },
            {
                question: "관자엽의 위쪽 이랑에 위치하는 언어영역은?",
                options: ["브로카영역", "베르니케영역 / 감각언어중추(Wernicke's area)", "모이랑", "일차운동영역"],
                answer: 1,
                rationale: "관자엽 위쪽 이랑에 위치하는 것은 베르니케영역(감각언어중추)입니다."
            },
            {
                question: "뇌줄기를 구성하는 3부분을 쓰시오.",
                options: ["시상, 시상하부, 뇌하수체", "중간뇌(Midbrain), 다리뇌(Pons), 숨뇌(Medulla oblongata)", "대뇌, 소뇌, 간뇌", "경질막, 거미막, 연질막"],
                answer: 1,
                rationale: "뇌줄기는 중간뇌, 다리뇌, 숨뇌로 구성됩니다."
            },
            {
                question: "뇌척수액이 생산되는 곳은?",
                options: ["거미막융모", "중간뇌수도관", "척수원뿔", "맥락얼기(Choroid plexus)"],
                answer: 3,
                rationale: "뇌척수액은 맥락얼기(Choroid plexus)에서 생산됩니다."
            },
            {
                question: "뇌신경과 척수신경의 수는?",
                options: ["뇌신경: 10쌍 척수신경: 31쌍", "뇌신경: 12쌍 척수신경: 31쌍", "뇌신경: 31쌍 척수신경: 12쌍", "뇌신경: 12쌍 척수신경: 33쌍"],
                answer: 1,
                rationale: "뇌신경은 12쌍, 척수신경은 31쌍입니다."
            },
            {
                question: "뇌신경 중에서 감각신경으로만 구성된 것은?",
                options: ["눈돌림신경, 도르래신경, 갓돌림신경", "얼굴신경, 혀인두신경, 미주신경", "후각신경(1), 시각신경(2), 속귀신경(8)", "삼차신경, 더부신경, 혀밑신경"],
                answer: 2,
                rationale: "후각신경, 시각신경, 속귀신경은 감각신경으로만 구성되어 있습니다."
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const progressText = document.getElementById('progressText');
        const feedbackBox = document.getElementById('feedbackBox');
        const nextBtn = document.getElementById('nextBtn');
        const quizContainer = document.getElementById('quizContainer');
        const resultScreen = document.getElementById('resultScreen');
        const scoreText = document.getElementById('scoreText');

        function loadQuestion() {
            // 초기화
            nextBtn.classList.remove('show');
            feedbackBox.classList.remove('show');
            feedbackBox.className = 'feedback'; // 클래스 리셋
            optionsContainer.innerHTML = '';

            const currentQuiz = quizData[currentQuestion];
            questionText.innerText = currentQuiz.question;
            progressText.innerText = `문제 ${currentQuestion + 1} / ${quizData.length}`;

            // 보기 버튼 생성
            currentQuiz.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerText = option;
                button.classList.add('option-btn');
                button.onclick = () => selectAnswer(index, button);
                optionsContainer.appendChild(button);
            });
        }

        function selectAnswer(selectedIndex, selectedButton) {
            const currentQuiz = quizData[currentQuestion];
            const allButtons = optionsContainer.querySelectorAll('.option-btn');

            // 모든 버튼 비활성화 (한 번만 선택 가능하도록)
            allButtons.forEach(btn => btn.disabled = true);

            // 정답 체크
            if (selectedIndex === currentQuiz.answer) {
                selectedButton.classList.add('correct');
                score++;
                feedbackBox.innerHTML = `<strong>정답입니다! 🎉</strong><br>${currentQuiz.rationale}`;
                feedbackBox.classList.add('feedback-correct');
            } else {
                selectedButton.classList.add('incorrect');
                // 정답 버튼에도 표시
                allButtons[currentQuiz.answer].classList.add('correct');
                feedbackBox.innerHTML = `<strong>오답입니다 🥲</strong><br>${currentQuiz.rationale}`;
                feedbackBox.classList.add('feedback-incorrect');
            }

            feedbackBox.classList.add('show');
            nextBtn.classList.add('show');
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            quizContainer.style.display = 'none';
            resultScreen.style.display = 'block';
            scoreText.innerText = `${score} / ${quizData.length}`;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            quizContainer.style.display = 'block';
            resultScreen.style.display = 'none';
            loadQuestion();
        }

        // 앱 시작
        loadQuestion();
    </script>
</body>
</html>
